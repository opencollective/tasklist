<style>
:root {
--bg: #f7f7f8;
--card: #ffffff;
--text: #191a1e;
--muted: #8a8d98;
--line: #e7e7ea;
--accent: #5b5bd6;
--accent-soft: #ececfb;
--done: #22a06b;
--danger: #d64545;
--shadow: 0 1px 2px rgba(20,20,30,.05), 0 8px 24px rgba(20,20,30,.06);
--stack-shadow: 0 -10px 22px rgba(20,20,30,.13);
--radius: 14px;
}
@media (prefers-color-scheme: dark) {
:root {
--bg: #101116;
--card: #1a1b22;
--text: #ececf1;
--muted: #7e8090;
--line: #2a2b34;
--accent: #8583f0;
--accent-soft: #26263c;
--done: #34c98b;
--danger: #ef6a6a;
--shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
--stack-shadow: 0 -10px 22px rgba(0,0,0,.5);
}
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
input, button, select, textarea { touch-action: manipulation; }
html, body { margin: 0; padding: 0; }
body {
background: var(--bg);
color: var(--text);
font: 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
min-height: 100dvh;
}
.wrap { max-width: 600px; margin: 0 auto; padding: 14px 16px calc(84px + env(safe-area-inset-bottom)); }
.newrow { display: flex; justify-content: center; padding: 18px 0 4px; }
.editable {
cursor: pointer;
border-bottom: 1.5px dotted color-mix(in srgb, var(--muted) 65%, transparent);
padding-bottom: 1px;
}
.editable:hover { color: var(--accent); border-bottom-color: var(--accent); }
.btn {
flex: none; border: 0; cursor: pointer; font: inherit; font-weight: 600;
border-radius: 999px; padding: 8px 15px;
background: var(--accent); color: #fff;
}
.btn.ghost { background: var(--accent-soft); color: var(--accent); }
.btn.danger { background: var(--danger); color: #fff; }
.btn.subtle { background: var(--card); border: 1px solid var(--line); color: var(--text); }
.btn:active { transform: scale(.97); }
.tl {
background: var(--card); border: 1px solid var(--line); border-radius: 16px;
box-shadow: var(--stack-shadow); overflow: hidden; position: relative;
}
.tl + .tl { margin-top: -16px; }
.tl.open { box-shadow: var(--stack-shadow), var(--shadow); }
.tl.open + .tl { margin-top: 10px; }
.tl.closed .tl-head { padding: 14px 16px; }
.tl.closed:not(:last-child) .tl-head { padding-bottom: 32px; }
.tl-head { display: flex; align-items: center; gap: 9px; padding: 12px 14px; cursor: pointer; user-select: none; min-width: 0; }
.tl-title {
flex: 1; min-width: 0; font-weight: 750; font-size: 17px; letter-spacing: -.02em;
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.todo-chip {
flex: none; font-size: 12px; font-weight: 700; white-space: nowrap;
color: var(--accent); background: var(--accent-soft); border-radius: 999px; padding: 3px 10px;
}
.todo-chip.zero { color: var(--done); background: transparent; border: 1px solid var(--line); }
#activebody { border-top: 1px solid var(--line); }
.addrow { display: flex; gap: 8px; padding: 6px; border-bottom: 1px solid var(--line); }
#newtask {
flex: 1; border: 0; outline: 0; background: transparent; color: var(--text);
font: inherit; font-size: 17px; padding: 10px 12px; min-width: 0;
}
#newtask::placeholder { color: var(--muted); }
#addbtn { border-radius: 10px; padding: 8px 16px; font-size: 20px; line-height: 1; }
.list:empty { display: none; }
.task {
display: flex; align-items: center; gap: 12px;
padding: 13px 14px; border-bottom: 1px solid var(--line);
cursor: pointer; user-select: none;
animation: pop .18s ease-out;
}
.task:last-child { border-bottom: 0; }
@keyframes pop { from { opacity: 0; transform: translateY(4px); } }
.check {
flex: none; width: 26px; height: 26px; border-radius: 50%;
border: 2px solid var(--line); background: transparent;
display: flex; align-items: center; justify-content: center;
font-size: 15px; color: #fff; transition: all .15s;
}
.task.mine .check, .task.claimed .check { border-color: var(--accent); }
.task.done .check { border-color: var(--done); background: var(--done); }
.title { flex: 1; min-width: 0; overflow-wrap: anywhere; }
.task.done .title { color: var(--muted); text-decoration: line-through; }
.chip {
flex: none; display: inline-flex; align-items: center; gap: 5px;
font-size: 12px; font-weight: 600; color: var(--muted);
background: var(--bg); border: 1px solid var(--line);
padding: 3px 9px 3px 6px; border-radius: 999px; max-width: 40%;
}
.chip .avatar { width: 12px; height: 12px; border-radius: 50%; flex: none; }
.chip span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.del {
flex: none; border: 0; background: transparent; color: var(--muted);
font-size: 17px; cursor: pointer; padding: 4px 6px; border-radius: 8px; opacity: .55;
}
.del:hover { color: var(--danger); opacity: 1; }
.task.grab .check { border-style: dashed; }

.thread { background: var(--bg); border-bottom: 1px solid var(--line); padding: 4px 14px 14px; cursor: default; }

.entry .avatar { width: 16px; height: 16px; border-radius: 50%; flex: none; margin-top: 2px; }
.entry.sys { color: var(--muted); font-size: 12.5px; align-items: center; }
.entry.sys .avatar { width: 12px; height: 12px; }
.entry .who { font-weight: 700; }
.entry .when { color: var(--muted); font-size: 11.5px; white-space: nowrap; }
.bubble { background: var(--card); border: 1px solid var(--line); border-radius: 4px 12px 12px 12px; padding: 7px 11px; overflow-wrap: anywhere; min-width: 0; }
.bubble .cmt-text { margin-top: 2px; }
.bubble img { max-width: 100%; max-height: 220px; border-radius: 8px; display: block; margin-top: 6px; }
.filechip { display: inline-flex; align-items: center; gap: 6px; margin-top: 6px; font-size: 13px; color: var(--accent); text-decoration: none; background: var(--accent-soft); border-radius: 8px; padding: 5px 10px; }
.assignbar { margin: 12px 0 2px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.assignhint { font-size: 12.5px; color: var(--muted); }
.cmtrow { display: flex; gap: 6px; margin-top: 12px; align-items: center; }
.cmtrow input[type=text] { flex: 1; font: inherit; font-size: 16px; background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: 8px 13px; outline: none; color: var(--text); min-width: 0; }
.cmtrow input[type=text]:focus { border-color: var(--accent); }
.iconbtn { background: var(--card); border: 1px solid var(--line); border-radius: 50%; width: 34px; height: 34px; cursor: pointer; font-size: 15px; flex: none; color: var(--text); }
#sharebtn { display: inline-flex; align-items: center; justify-content: center; color: var(--accent); }
#sharebtn:active { transform: scale(.94); }
.btn.small { padding: 7px 13px; font-size: 14px; }
.pendingfile { font-size: 12px; color: var(--muted); margin-top: 6px; overflow-wrap: anywhere; }
.hiddenfile { display: none; }
.divider { padding: 14px 14px 8px; border-top: 1px solid var(--line); font-size: 12.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
#opentasks:empty ~ .divider { border-top: 0; }
#donelist .task { opacity: .75; }
.empty { text-align: center; color: var(--muted); padding: 36px 24px; }
.empty .big { font-size: 40px; margin-bottom: 10px; }
.empty p { margin: 4px 0; font-size: 14.5px; }
footer {
position: fixed; bottom: 0; left: 0; right: 0;

pointer-events: none;
}

max-width: 600px; margin: 0 auto; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;

#aboutlink { margin-left: auto; color: var(--muted); cursor: pointer; text-decoration: underline dotted; }

position: fixed; left: 50%; bottom: calc(74px + env(safe-area-inset-bottom));
transform: translateX(-50%) translateY(8px);
background: var(--text); color: var(--bg);
padding: 9px 16px; border-radius: 999px; font-size: 14px; font-weight: 600;
opacity: 0; pointer-events: none; transition: all .22s; white-space: nowrap; z-index: 90;
max-width: 92vw; overflow: hidden; text-overflow: ellipsis;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

#overlay {
position: fixed; inset: 0; background: rgba(10,10,16,.45);

}
#overlay.show { display: flex; }

background: var(--card); color: var(--text);
border-radius: 20px 20px 0 0; padding: 22px 20px calc(22px + env(safe-area-inset-bottom));
width: 100%; max-width: 600px; box-shadow: var(--shadow);
animation: rise .2s ease-out;
}
@media (min-width: 640px) {

}

#modal p { margin: 4px 0 14px; color: var(--muted); font-size: 14px; }

width: 100%; font: inherit; font-size: 17px; color: var(--text);
background: var(--bg); border: 1px solid var(--line); border-radius: 10px;
padding: 11px 13px; outline: none; margin-bottom: 14px;
}

.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.qrbox { display: flex; justify-content: center; margin: 4px 0 14px; }

.urlline {
font-size: 13px; color: var(--muted); background: var(--bg);
border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px;
overflow-wrap: anywhere; margin-bottom: 14px; user-select: all;
}
.about-key { font-size: 12px; color: var(--muted); overflow-wrap: anywhere; }

const n = names.get(pk);

}
function relTime(at) {
const d = Math.max(0, Math.floor(Date.now() / 1000) - at);
if (d < 60) return 'now';
if (d < 3600) return Math.floor(d / 60) + 'm';
if (d < 86400) return Math.floor(d / 3600) + 'h';

function el(tag, attrs, ...children) {

if (attrs[k] == null) continue;
if (k === 'class') n.className = attrs[k];
else if (k.startsWith('on')) n[k] = attrs[k];
else n.setAttribute(k, attrs[k]);
}
for (const c of children) n.append(c);
return n;
}
function avatar(pk, cls) {

const overlay = $('overlay'), modal = $('modal');

function askProfileName(next) {

hint: 'Shown on tasks you grab, comments you write, and lists you create.',

placeholder: 'e.g. Xavier',
saveLabel: 'Save name',
skipLabel: myName ? null : 'Stay anonymous',

}, async (v) => {

function claimTask(t) {

function circleTap(t) {

function toggleExpand(t) {

function sendComment(t) {

let att = null;
if (file) {
uploading.add(t.id);

function threadEntries(t) {

a.act === 'claim' ? 'took this task' :
a.act === 'unclaim' ? 'stepped away from this task' :
a.act === 'done' ? 'marked this as done ✓' :
a.act === 'undone' ? 'reopened this' : null;

function buildThread(t, st) {

el('span', { class: 'when' }, relTime(en.at))));
} else {
const bubble = el('div', { class: 'bubble' },
el('span', { class: 'who' }, who), ' ', el('span', { class: 'when' }, relTime(en.at)));

if (en.att) {

bubble.appendChild(el('img', { src: en.att.url, alt: en.att.name, loading: 'lazy' }));
} else {
bubble.appendChild(el('a', { class: 'filechip', href: en.att.url, target: '_blank', rel: 'noopener' }, '📎 ' + en.att.name));

}
if (!st.done && st.assignee !== ME && !(st.assignee === null && t.creator === ME)) {
wrap.appendChild(el('div', { class: 'assignbar' },
el('button', { class: 'btn small', id: 'assignbtn', onclick: () => claimTask(t) },
st.assignee ? 'Take over this task' : 'Assign to me'),
el('span', { class: 'assignhint' },
st.assignee ? 'Currently with ' + nameOf(st.assignee) + '.' : 'Grab it before checking it off.')));
}
const fi = el('input', { type: 'file', class: 'hiddenfile' });
fi.onchange = () => { pendingFiles.set(t.id, fi.files[0] || null); scheduleRender(); };

wrap.appendChild(el('div', { class: 'cmtrow' },
el('button', { class: 'iconbtn', title: 'Attach an image or file', onclick: () => fi.click() }, '📎'),

el('button', { class: 'btn small', id: 'cmt-send', onclick: () => sendComment(t), disabled: isUp ? '' : null },
isUp ? 'Uploading…' : 'Send')));

function rowFor(t, st) {

let renderQueued = false;
function scheduleRender() {

}
function ownerPk() { return earliest ? earliest.pubkey : ME; }
// Fold a list's cached events into {name, ownerName, open, total} without touching live state.
function summarizeList(id) {

let meta = { name: '', at: 0 };
let first = null;

if (!name) return;
const cur = nm.get(pk);
if (!cur || at >= cur.at) nm.set(pk, { name: String(name).slice(0, 24), at });
};
for (const e of evts) {
if (!e || !e.id) continue;
if (e.kind === KIND_PROFILE) {
try { learn(e.pubkey, JSON.parse(e.content).name, e.created_at); } catch {}
continue;
}
const nt = (e.tags || []).find((t) => t[0] === 'name');
if (nt) learn(e.pubkey, nt[1], e.created_at);
if (!first || e.created_at < first.created_at || (e.created_at === first.created_at && e.id < first.id)) first = e;
const eTag = (e.tags || []).find((t) => t[0] === 'e');
const aTag = (e.tags || []).find((t) => t[0] === 'action');
if (e.kind === KIND_TASK) {
if (String(e.content || '').trim()) ts.set(e.id, { creator: e.pubkey });
} else if (e.kind === KIND_ACTION && eTag && aTag) {
if (!ac.has(eTag[1])) ac.set(eTag[1], []);
ac.get(eTag[1]).push({ pubkey: e.pubkey, created_at: e.created_at, id: e.id, act: aTag[1] });
} else if (e.kind === KIND_META) {
const n = String(e.content || '').slice(0, 48).trim();
if (n && e.created_at >= meta.at) meta = { name: n, at: e.created_at };
}

let open = 0, total = 0;
for (const [tid, t] of ts) {
const acts = (ac.get(tid) || []).sort((a, b) => a.created_at - b.created_at || (a.id < b.id ? -1 : 1));

for (const a of acts) {
if (a.act === 'done') done = true;
else if (a.act === 'undone') done = false;
else if (a.act === 'delete' && a.pubkey === t.creator) deleted = true;

total++;
if (!done) open++;

function todoChip(open, total) {

function removeList(id) {

// Rebuild the card stack in registry order; the active list keeps its position and

function renderStack() {

function renderTitle() {

function render() {

nsec: () => C.nsecEncode(sk), npub: () => C.npubEncode(ME) };
})();
